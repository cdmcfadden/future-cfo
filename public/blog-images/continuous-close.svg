<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="70%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#05060a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#7cf0ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#05060a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" x2="1">
      <stop offset="0" stop-color="#7cf0ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#05060a"/>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#g2)"/>

  <!-- waveform ledger -->
  <g stroke="#7cf0ff" stroke-width="2" fill="none" opacity="0.7">
    <path d="M0 500 Q200 420 400 500 T800 500 T1200 500 T1600 500"/>
    <path d="M0 540 Q200 460 400 540 T800 540 T1200 540 T1600 540" opacity="0.5"/>
    <path d="M0 580 Q200 500 400 580 T800 580 T1200 580 T1600 580" opacity="0.3"/>
  </g>

  <!-- ticks -->
  <g stroke="#a78bfa" stroke-width="2" opacity="0.6">
    <line x1="120" y1="620" x2="120" y2="650"/>
    <line x1="340" y1="620" x2="340" y2="650"/>
    <line x1="560" y1="620" x2="560" y2="650"/>
    <line x1="780" y1="620" x2="780" y2="650"/>
    <line x1="1000" y1="620" x2="1000" y2="650"/>
    <line x1="1220" y1="620" x2="1220" y2="650"/>
    <line x1="1440" y1="620" x2="1440" y2="650"/>
  </g>

  <g font-family="ui-sans-serif, -apple-system, system-ui" font-weight="700">
    <text x="80" y="260" font-size="110" fill="url(#txt)" letter-spacing="-3">Continuous</text>
    <text x="80" y="370" font-size="110" fill="#e7ecf5" letter-spacing="-3">close.</text>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#7cf0ff" font-size="20" opacity="0.7">
    <text x="80" y="420">the books as a live system</text>
    <text x="80" y="820">02 · continuous-close.mdx</text>
  </g>
</svg>
